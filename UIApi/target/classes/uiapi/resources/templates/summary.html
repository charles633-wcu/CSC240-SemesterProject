<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>NYC Crime–Temperature Summary</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 40px; background: #fafafa; color: #222; }
    h1 { color: #007bff; }
    ul { list-style: none; padding: 0; }
    li { margin-bottom: 4px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2em; }
    .card { background: white; padding: 1em; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <h1>NYC Crime–Temperature Summary</h1>
  <h2>Date: {{date}}</h2>
  <h3>Total Incidents: {{total}}</h3>
  <h3>Temperature: {{temp}} °F</h3>

  <div class="grid">
    <div class="card">
      <h3>Perpetrators by Sex</h3>
      {{perpsBySex}}
    </div>
    <div class="card">
      <h3>Victims by Sex</h3>
      {{vicsBySex}}
    </div>
    <div class="card">
      <h3>Perpetrators by Age Range</h3>
      {{perpsByAge}}
    </div>
    <div class="card">
      <h3>Victims by Age Range</h3>
      {{vicsByAge}}
    </div>
  </div>
</body>
</html>
