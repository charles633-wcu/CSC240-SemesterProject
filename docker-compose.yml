version: "3.9"

services:
  dataapi:
    build: ./DataAPI
    container_name: dataapi
    ports:
      - "8081:8081"
    volumes:
      - ./IncidentsDB.db:/app/IncidentsDB.db
      - ./VictimsDB.db:/app/VictimsDB.db
      - ./PerpetratorsDB.db:/app/PerpetratorsDB.db
      - ./TemperatureDB.db:/app/TemperatureDB.db
    networks:
      - apisix

  classapi:
    build: ./ClassAPI
    container_name: classapi
    ports:
      - "8082:8082"
    depends_on:
      - dataapi
    environment:
      DATA_API_URL: "http://dataapi:8081/data"
    networks:
      - apisix

  uiapi:
    build: ./UIAPI
    container_name: uiapi
    ports:
      - "8083:8083"
    depends_on:
      - classapi
    networks:
      - apisix

  etcd:
    image: bitnamilegacy/etcd:3.4.9
    container_name: etcd
    restart: always
    environment:
      ALLOW_NONE_AUTHENTICATION: "yes"
      ETCD_ENABLE_V2: "true"
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "2379:2379"
    networks:
      - apisix

  apisix:
    image: apache/apisix:3.7.0-debian
    container_name: apisix
    restart: always
    depends_on:
      - etcd
      - dataapi
      - classapi
      - uiapi
    volumes:
      - ./conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    ports:
      - "9080:9080"
      - "9180:9180"
      - "9443:9443"
    networks:
      - apisix

  route-init:
    image: curlimages/curl:8.6.0
    container_name: route-init
    depends_on:
      - apisix
    networks:
      - apisix
    entrypoint: |
      sh -c '
        echo "Waiting for APISIX admin API to be ready..." &&
        # keep retrying until we get HTTP 200 or 401 (means APISIX is alive)
        until curl -s -o /dev/null -w "%{http_code}" http://apisix:9180/apisix/admin/routes | grep -q "200\|401"; do
          echo "  APISIX not ready yet. Retrying in 3 seconds..."
          sleep 3
        done &&
        echo "APISIX is ready! Registering routes..." &&

        echo "Registering /data route..." &&
        curl -s -X PUT http://apisix:9180/apisix/admin/routes/1 \
          -H "X-API-KEY: edd1c9f034335f136f87ad84b625c8f1" \
          -H "Content-Type: application/json" \
          -d "{\"uri\":\"/data/*\",\"upstream\":{\"nodes\":{\"dataapi:8081\":1},\"type\":\"roundrobin\"}}" &&

        echo "Registering /summary route..." &&
        curl -s -X PUT http://apisix:9180/apisix/admin/routes/2 \
          -H "X-API-KEY: edd1c9f034335f136f87ad84b625c8f1" \
          -H "Content-Type: application/json" \
          -d "{\"uri\":\"/summary/*\",\"upstream\":{\"nodes\":{\"classapi:8082\":1},\"type\":\"roundrobin\"}}" &&

        echo "Registering /ui route..." &&
        curl -s -X PUT http://apisix:9180/apisix/admin/routes/3 \
          -H "X-API-KEY: edd1c9f034335f136f87ad84b625c8f1" \
          -H "Content-Type: application/json" \
          -d "{\"uri\":\"/ui/*\",\"upstream\":{\"nodes\":{\"uiapi:8083\":1},\"type\":\"roundrobin\"}}" &&

        echo "All routes registered successfully."
      '


networks:
  apisix:
    driver: bridge
