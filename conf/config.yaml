routes:
  - uri: /data/*
    upstream:
      nodes:
        "host.docker.internal:8081": 1
      type: roundrobin

  - uri: /summary/*
    upstream:
      nodes:
        "host.docker.internal:8082": 1
      type: roundrobin

  - uri: /ui/*
    upstream:
      nodes:
        "host.docker.internal:8083": 1
      type: roundrobin
