apisix:
  node_listen: 9080
  enable_admin: true
  admin_key:
    - name: admin
      key: edd1c9f034335f136f87ad84b625c8f1
      role: admin

routes:
  -
    uri: /data/*
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:8081": 1

  -
    uri: /summary/*
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:8082": 1

  -
    uri: /ui/*
    upstream:
      type: roundrobin
      nodes:
        "host.docker.internal:8083": 1
